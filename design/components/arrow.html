<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SnapVector arrow component</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Arrow component</h1>
        <p>測試多角度、多長度的 Skitch-style 紅色白邊箭頭。</p>
      </header>

      <section class="component-card">
        <div class="component-stage">
          <svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" aria-label="arrow examples">
            <defs>
              <style>
                .sv-red {
                  fill: #e53935;
                  stroke: #ffffff;
                  stroke-width: 6;
                  stroke-linecap: round;
                  stroke-linejoin: round;
                  paint-order: stroke fill;
                }

                .sv-stroke {
                  fill: none;
                  stroke: #e53935;
                  stroke-width: 10;
                  stroke-linecap: round;
                  stroke-linejoin: round;
                  vector-effect: non-scaling-stroke;
                }

                .sv-outline {
                  fill: none;
                  stroke: #ffffff;
                  stroke-width: 16;
                  stroke-linecap: round;
                  stroke-linejoin: round;
                  vector-effect: non-scaling-stroke;
                }
              </style>

              <symbol id="annotation-arrow" viewBox="0 0 240 120">
                <polygon points="6,60 132,48 132,24 228,60 132,96 132,72" class="sv-red" />
              </symbol>
            </defs>

            <use href="#annotation-arrow" x="36" y="82" width="240" height="120" transform="rotate(-62 156 142)" />
            <use href="#annotation-arrow" x="300" y="56" width="180" height="90" transform="rotate(-24 390 101)" />
            <use href="#annotation-arrow" x="534" y="112" width="280" height="140" transform="rotate(12 674 182)" />
            <use href="#annotation-arrow" x="160" y="176" width="200" height="100" transform="rotate(-40 260 226)" />
            <use href="#annotation-arrow" x="446" y="184" width="160" height="80" transform="rotate(32 526 224)" />
          </svg>
        </div>
      </section>
    </main>
  </body>
</html>
