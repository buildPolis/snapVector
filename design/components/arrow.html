<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SnapVector arrow component</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Arrow component</h1>
        <p>測試多角度、多長度的 Skitch-style 紅色白邊箭頭。</p>
      </header>

      <section class="component-card">
        <div class="component-stage">
          <svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" aria-label="arrow examples">
            <defs>
              <style>
                .sv-red {
                  fill: #e53935;
                  stroke: #ffffff;
                  stroke-width: 3;
                  stroke-linecap: round;
                  stroke-linejoin: round;
                  paint-order: stroke fill;
                }

                .sv-stroke {
                  fill: none;
                  stroke: #e53935;
                  stroke-width: 10;
                  stroke-linecap: round;
                  stroke-linejoin: round;
                  vector-effect: non-scaling-stroke;
                }

                .sv-outline {
                  fill: none;
                  stroke: #ffffff;
                  stroke-width: 16;
                  stroke-linecap: round;
                  stroke-linejoin: round;
                  vector-effect: non-scaling-stroke;
                }
              </style>

              <symbol id="annotation-arrow" viewBox="0 0 240 120">
                <g transform="translate(10 10)">
                  <path class="sv-outline" d="M10 95 C70 92 124 72 178 28" />
                  <path class="sv-stroke" d="M10 95 C70 92 124 72 178 28" />
                  <path class="sv-red" d="M172 10 L220 24 L183 62 Z" />
                </g>
              </symbol>
            </defs>

            <use href="#annotation-arrow" x="48" y="48" width="240" height="120" />
            <use href="#annotation-arrow" x="330" y="34" width="180" height="90" transform="rotate(18 420 79)" />
            <use href="#annotation-arrow" x="552" y="80" width="280" height="140" transform="rotate(-16 692 150)" />
            <use href="#annotation-arrow" x="164" y="180" width="200" height="100" transform="rotate(-28 264 230)" />
            <use href="#annotation-arrow" x="432" y="188" width="160" height="80" transform="rotate(34 512 228)" />
          </svg>
        </div>
      </section>
    </main>
  </body>
</html>
