<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <title>SnapVector baseline symbols</title>
  <desc>Skitch-style annotation library, selection chrome, and tool icons. Single source of truth for qt, tauri, and wails tracks.</desc>
  <defs>
    <style>
      .sv-red {
        fill: #e53935;
        stroke: #ffffff;
        stroke-width: 6;
        stroke-linecap: round;
        stroke-linejoin: round;
        paint-order: stroke fill;
      }

      .sv-stroke {
        fill: none;
        stroke: #e53935;
        stroke-width: 10;
        stroke-linecap: round;
        stroke-linejoin: round;
        vector-effect: non-scaling-stroke;
      }

      .sv-outline {
        fill: none;
        stroke: #ffffff;
        stroke-width: 16;
        stroke-linecap: round;
        stroke-linejoin: round;
        vector-effect: non-scaling-stroke;
      }

      .sv-text {
        font-family: -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
        font-weight: 800;
      }

      .sv-icon {
        fill: none;
        stroke: currentColor;
        stroke-width: 1.75;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .sv-handle {
        fill: #ffffff;
        stroke: #e53935;
        stroke-width: 2;
      }

      .sv-marquee {
        fill: none;
        stroke: #e53935;
        stroke-width: 2;
        stroke-dasharray: 6 4;
      }

      .sv-label {
        font-family: -apple-system, BlinkMacSystemFont, "Noto Sans CJK TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
        font-size: 18px;
        fill: #475467;
      }
    </style>

    <!-- Annotation symbols (canonical §2.4 types) -->
    <symbol id="annotation-arrow" viewBox="0 0 240 120">
      <polygon points="6,60 132,48 132,24 228,60 132,96 132,72" class="sv-red" />
    </symbol>

    <symbol id="annotation-rectangle" viewBox="0 0 220 140">
      <rect x="14" y="14" width="192" height="112" rx="18" class="sv-outline" />
      <rect x="14" y="14" width="192" height="112" rx="18" class="sv-stroke" />
    </symbol>

    <symbol id="annotation-ellipse" viewBox="0 0 220 140">
      <ellipse cx="110" cy="70" rx="92" ry="52" class="sv-outline" />
      <ellipse cx="110" cy="70" rx="92" ry="52" class="sv-stroke" />
    </symbol>

    <symbol id="annotation-text-solid" viewBox="0 0 260 92">
      <rect x="8" y="8" width="244" height="76" rx="18" class="sv-red" />
      <text x="26" y="56" class="sv-text" fill="#ffffff" font-size="30">重點區域</text>
    </symbol>

    <symbol id="annotation-text-outline" viewBox="0 0 260 92">
      <rect x="8" y="8" width="244" height="76" rx="18" fill="#ffffff" stroke="#ffffff" stroke-width="3" />
      <rect x="8" y="8" width="244" height="76" rx="18" fill="none" stroke="#e53935" stroke-width="8" />
      <text x="26" y="56" class="sv-text" fill="#e53935" font-size="30">請看這裡</text>
    </symbol>

    <filter id="preview-blur">
      <feGaussianBlur stdDeviation="4" />
    </filter>

    <symbol id="annotation-blur" viewBox="0 0 220 140">
      <rect x="14" y="14" width="192" height="112" rx="18" fill="#ffffff" opacity="0.14" />
      <g filter="url(#preview-blur)" opacity="0.72">
        <rect x="36" y="42" width="140" height="16" rx="8" fill="#cbd5e1" />
        <rect x="52" y="68" width="122" height="14" rx="7" fill="#e2e8f0" />
        <rect x="40" y="90" width="96" height="14" rx="7" fill="#cbd5e1" />
      </g>
      <rect x="14" y="14" width="192" height="112" rx="18" fill="none" stroke="#ffffff" stroke-width="4" />
      <rect x="14" y="14" width="192" height="112" rx="18" fill="none" stroke="#e53935" stroke-width="6" stroke-dasharray="10 6" />
    </symbol>

    <!-- Selection chrome (UI-only; not part of exported SVG) -->
    <symbol id="selection-frame" viewBox="0 0 240 160">
      <rect x="4" y="4" width="232" height="152" class="sv-marquee" rx="10" />
      <rect x="-4" y="-4" width="12" height="12" class="sv-handle" rx="2" />
      <rect x="114" y="-4" width="12" height="12" class="sv-handle" rx="2" />
      <rect x="232" y="-4" width="12" height="12" class="sv-handle" rx="2" />
      <rect x="-4" y="74" width="12" height="12" class="sv-handle" rx="2" />
      <rect x="232" y="74" width="12" height="12" class="sv-handle" rx="2" />
      <rect x="-4" y="152" width="12" height="12" class="sv-handle" rx="2" />
      <rect x="114" y="152" width="12" height="12" class="sv-handle" rx="2" />
      <rect x="232" y="152" width="12" height="12" class="sv-handle" rx="2" />
    </symbol>

    <!-- Tool icons (24x24 baseline) -->
    <symbol id="icon-select" viewBox="0 0 24 24">
      <path class="sv-icon" d="M5 3l14 9-7 1-1 7-6-17z" />
    </symbol>

    <symbol id="icon-arrow" viewBox="0 0 24 24">
      <path class="sv-icon" d="M5 19 19 5" />
      <path class="sv-icon" d="M12 5h7v7" />
    </symbol>

    <symbol id="icon-rectangle" viewBox="0 0 24 24">
      <rect class="sv-icon" x="4" y="6" width="16" height="12" rx="2.5" />
    </symbol>

    <symbol id="icon-ellipse" viewBox="0 0 24 24">
      <ellipse class="sv-icon" cx="12" cy="12" rx="8" ry="6" />
    </symbol>

    <symbol id="icon-text" viewBox="0 0 24 24">
      <path class="sv-icon" d="M5 6h14" />
      <path class="sv-icon" d="M12 6v13" />
    </symbol>

    <symbol id="icon-blur" viewBox="0 0 24 24">
      <rect class="sv-icon" x="4" y="6" width="16" height="12" rx="3" />
      <path class="sv-icon" d="M8 10c1.1-1 2.2-1 3.3 0s2.2 1 3.4 0 2.2-1 3.3 0" />
      <path class="sv-icon" d="M8 14c1.1-1 2.2-1 3.3 0s2.2 1 3.4 0 2.2-1 3.3 0" />
    </symbol>

    <symbol id="icon-numbered-circle" viewBox="0 0 24 24">
      <circle class="sv-icon" cx="12" cy="12" r="8.5" />
      <text x="12" y="12" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="800" fill="currentColor" stroke="none">1</text>
    </symbol>

    <symbol id="annotation-numbered-circle" viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="34" fill="#e53935" stroke="#ffffff" stroke-width="6" paint-order="stroke fill" />
      <text x="40" y="40" text-anchor="middle" dominant-baseline="central" font-size="30" font-weight="800" fill="#ffffff">1</text>
    </symbol>

    <symbol id="icon-crop" viewBox="0 0 24 24">
      <path class="sv-icon" d="M7 3v14h14" />
      <path class="sv-icon" d="M3 7h14v14" />
    </symbol>

    <symbol id="icon-undo" viewBox="0 0 24 24">
      <path class="sv-icon" d="M4 10h11a5 5 0 015 5v1" />
      <path class="sv-icon" d="M9 5l-5 5 5 5" />
    </symbol>

    <symbol id="icon-redo" viewBox="0 0 24 24">
      <path class="sv-icon" d="M20 10H9a5 5 0 00-5 5v1" />
      <path class="sv-icon" d="M15 5l5 5-5 5" />
    </symbol>

    <symbol id="icon-copy" viewBox="0 0 24 24">
      <rect class="sv-icon" x="8" y="8" width="12" height="12" rx="2" />
      <path class="sv-icon" d="M4 16V6a2 2 0 012-2h10" />
    </symbol>

    <symbol id="icon-download" viewBox="0 0 24 24">
      <path class="sv-icon" d="M12 4v12" />
      <path class="sv-icon" d="M7 11l5 5 5-5" />
      <path class="sv-icon" d="M4 20h16" />
    </symbol>

    <symbol id="icon-capture" viewBox="0 0 24 24">
      <rect class="sv-icon" x="3" y="6" width="18" height="13" rx="2" />
      <circle class="sv-icon" cx="12" cy="12.5" r="3.5" />
      <path class="sv-icon" d="M8 6l2-2h4l2 2" />
    </symbol>
  </defs>

  <rect width="1200" height="1200" fill="#f8fafc" />

  <text x="40" y="62" fill="#101828" class="sv-label" font-size="34" font-weight="800">
    SnapVector symbol baseline
  </text>
  <text x="40" y="96" class="sv-label">
    Geometry, stroke, and colour source-of-truth for all three implementation tracks.
  </text>

  <text x="40" y="138" class="sv-label" font-weight="800" fill="#101828">Annotation primitives</text>

  <g transform="translate(60 160)">
    <use href="#annotation-arrow" width="240" height="120" />
    <text x="0" y="148" class="sv-label">annotation-arrow</text>
  </g>

  <g transform="translate(360 150)">
    <use href="#annotation-rectangle" width="220" height="140" />
    <text x="0" y="170" class="sv-label">annotation-rectangle</text>
  </g>

  <g transform="translate(660 150)">
    <use href="#annotation-ellipse" width="220" height="140" />
    <text x="0" y="170" class="sv-label">annotation-ellipse</text>
  </g>

  <g transform="translate(920 150)">
    <use href="#annotation-blur" width="220" height="140" />
    <text x="0" y="170" class="sv-label">annotation-blur</text>
  </g>

  <g transform="translate(60 350)">
    <use href="#annotation-text-solid" width="260" height="92" />
    <text x="0" y="126" class="sv-label">annotation-text-solid</text>
  </g>

  <g transform="translate(380 350)">
    <use href="#annotation-text-outline" width="260" height="92" />
    <text x="0" y="126" class="sv-label">annotation-text-outline</text>
  </g>

  <g transform="translate(700 350)">
    <use href="#selection-frame" width="240" height="160" />
    <text x="0" y="184" class="sv-label">selection-frame (UI chrome)</text>
  </g>

  <text x="40" y="590" class="sv-label" font-weight="800" fill="#101828">Tool icons (24px baseline)</text>

  <g transform="translate(60 620)" color="#101828">
    <g transform="translate(0 0)"><rect width="56" height="56" rx="14" fill="#ffffff" stroke="#e5e7eb" /><use href="#icon-select" x="16" y="16" width="24" height="24" /></g>
    <g transform="translate(72 0)"><rect width="56" height="56" rx="14" fill="#ffffff" stroke="#e5e7eb" /><use href="#icon-arrow" x="16" y="16" width="24" height="24" /></g>
    <g transform="translate(144 0)"><rect width="56" height="56" rx="14" fill="#ffffff" stroke="#e5e7eb" /><use href="#icon-rectangle" x="16" y="16" width="24" height="24" /></g>
    <g transform="translate(216 0)"><rect width="56" height="56" rx="14" fill="#ffffff" stroke="#e5e7eb" /><use href="#icon-ellipse" x="16" y="16" width="24" height="24" /></g>
    <g transform="translate(288 0)"><rect width="56" height="56" rx="14" fill="#ffffff" stroke="#e5e7eb" /><use href="#icon-text" x="16" y="16" width="24" height="24" /></g>
    <g transform="translate(360 0)"><rect width="56" height="56" rx="14" fill="#ffffff" stroke="#e5e7eb" /><use href="#icon-blur" x="16" y="16" width="24" height="24" /></g>
    <g transform="translate(432 0)"><rect width="56" height="56" rx="14" fill="#ffffff" stroke="#e5e7eb" /><use href="#icon-crop" x="16" y="16" width="24" height="24" /></g>
    <g transform="translate(504 0)"><rect width="56" height="56" rx="14" fill="#ffffff" stroke="#e5e7eb" /><use href="#icon-undo" x="16" y="16" width="24" height="24" /></g>
    <g transform="translate(576 0)"><rect width="56" height="56" rx="14" fill="#ffffff" stroke="#e5e7eb" /><use href="#icon-redo" x="16" y="16" width="24" height="24" /></g>
    <g transform="translate(648 0)"><rect width="56" height="56" rx="14" fill="#ffffff" stroke="#e5e7eb" /><use href="#icon-copy" x="16" y="16" width="24" height="24" /></g>
    <g transform="translate(720 0)"><rect width="56" height="56" rx="14" fill="#ffffff" stroke="#e5e7eb" /><use href="#icon-download" x="16" y="16" width="24" height="24" /></g>
    <g transform="translate(792 0)"><rect width="56" height="56" rx="14" fill="#ffffff" stroke="#e5e7eb" /><use href="#icon-capture" x="16" y="16" width="24" height="24" /></g>
  </g>

  <g transform="translate(60 700)" class="sv-label">
    <text x="12" y="18">select</text>
    <text x="80" y="18">arrow</text>
    <text x="152" y="18">rect</text>
    <text x="224" y="18">ellipse</text>
    <text x="300" y="18">text</text>
    <text x="368" y="18">blur</text>
    <text x="438" y="18">crop</text>
    <text x="510" y="18">undo</text>
    <text x="582" y="18">redo</text>
    <text x="654" y="18">copy</text>
    <text x="720" y="18">export</text>
    <text x="794" y="18">capture</text>
  </g>
</svg>
