<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SnapVector</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="app-shell" aria-label="snapvector gui shell">
        <div class="app-topbar">
          <div class="app-brand">
            <span class="brand-mark">SV</span>
            <div class="app-title-group">
              <span class="eyebrow">SnapVector</span>
              <strong id="captureTitle">準備擷取畫面</strong>
            </div>
          </div>
          <div class="topbar-actions">
            <div class="menu-shell">
              <button type="button" id="fileMenuButton" class="ghost-btn menu-trigger" aria-haspopup="menu" aria-expanded="false">
                File
                <svg><use href="#icon-chevron-down" /></svg>
              </button>
              <div id="fileMenu" class="menu-dropdown is-hidden" role="menu" aria-label="File menu">
                <button type="button" id="openDocumentButton" class="menu-item" role="menuitem">Open…</button>
                <button type="button" id="saveDocumentButton" class="menu-item" role="menuitem">Save</button>
                <button type="button" id="saveDocumentAsButton" class="menu-item" role="menuitem">Save As…</button>
              </div>
            </div>
            <span id="documentBadge" class="document-badge">Untitled · saved</span>
          </div>
          <span class="kbd-hint">
            <span class="kbd">⌘</span><span class="kbd">⇧</span><span class="kbd">4</span>
            <span>Wails GUI shell</span>
          </span>
          <span class="mode-pill">GUI shell</span>
        </div>

        <div class="app-body">
          <aside class="tool-rail" aria-label="tool rail">
            <button type="button" class="tool-btn is-active" data-tool="select" title="Select (V)">
              <svg><use href="#icon-select" /></svg>
            </button>
            <button type="button" class="tool-btn" data-tool="arrow" title="Arrow (A)">
              <svg><use href="#icon-arrow" /></svg>
            </button>
            <button type="button" class="tool-btn" data-tool="rectangle" title="Rectangle (R)">
              <svg><use href="#icon-rectangle" /></svg>
            </button>
            <button type="button" class="tool-btn" data-tool="ellipse" title="Ellipse (O)">
              <svg><use href="#icon-ellipse" /></svg>
            </button>
            <button type="button" class="tool-btn" data-tool="text" title="Text (T)">
              <svg><use href="#icon-text" /></svg>
            </button>
            <button type="button" class="tool-btn" data-tool="blur" title="Blur (B)">
              <svg><use href="#icon-blur" /></svg>
            </button>
            <div class="tool-rail-divider"></div>
            <button type="button" class="tool-btn" data-tool="crop" title="Crop (C)">
              <svg><use href="#icon-crop" /></svg>
            </button>
            <button type="button" class="tool-btn" id="captureRegionButton" title="Capture region (OS native)">
              <svg><use href="#icon-region-capture" /></svg>
            </button>
            <button type="button" class="tool-btn" id="captureAllDisplaysButton" title="Capture all displays (in-app crop)">
              <svg><use href="#icon-all-displays" /></svg>
            </button>
            <button type="button" class="tool-btn" id="captureButton" data-tool="capture" title="Re-capture">
              <svg><use href="#icon-capture" /></svg>
            </button>
          </aside>

          <section class="canvas-area">
            <div class="canvas-actions">
              <div class="action-group">
                <button id="undoButton" class="icon-btn" title="Undo">
                  <svg><use href="#icon-undo" /></svg>
                </button>
                <button id="redoButton" class="icon-btn" title="Redo">
                  <svg><use href="#icon-redo" /></svg>
                </button>
              </div>
              <button id="zoomOutButton" class="ghost-btn" title="Zoom out">-</button>
              <button id="zoomResetButton" class="ghost-btn" title="Reset zoom">100%</button>
              <button id="zoomInButton" class="ghost-btn" title="Zoom in">+</button>
              <button id="copyButton" class="ghost-btn" title="Copy to clipboard">
                <svg><use href="#icon-copy" /></svg>
                Copy
              </button>
              <label class="toolbar-select-wrapper">
                <span class="visually-hidden">Export format</span>
                <select id="exportFormat" class="toolbar-select">
                  <option value="svg">SVG</option>
                  <option value="png">PNG</option>
                  <option value="jpg">JPG</option>
                  <option value="pdf">PDF</option>
                </select>
              </label>
              <button id="exportButton" class="primary-btn" title="Export current result">
                <svg><use href="#icon-download" /></svg>
                Export
              </button>
            </div>

            <div class="canvas" id="canvasHost">
              <div class="overlay-grid" aria-hidden="true"></div>
              <div id="emptyState" class="empty-state">從左側工具列選擇擷取方式開始（Capture region / all displays / re-capture）</div>
              <div id="canvasStage" class="canvas-stage is-hidden">
                <img id="captureImage" class="capture-image" alt="Captured screen" />
                <svg id="annotationLayer" class="symbol-layer" xmlns="http://www.w3.org/2000/svg"></svg>
                <div id="htmlAnnotationLayer" class="html-annotation-layer"></div>
                <div id="selectionBox" class="selection-box is-hidden">
                  <span class="selection-handle" data-handle="nw"></span>
                  <span class="selection-handle" data-handle="n"></span>
                  <span class="selection-handle" data-handle="ne"></span>
                  <span class="selection-handle" data-handle="e"></span>
                  <span class="selection-handle" data-handle="se"></span>
                  <span class="selection-handle" data-handle="s"></span>
                  <span class="selection-handle" data-handle="sw"></span>
                  <span class="selection-handle" data-handle="w"></span>
                  <span class="selection-handle endpoint-handle is-hidden" data-handle="start"></span>
                  <span class="selection-handle endpoint-handle is-hidden" data-handle="end"></span>
                </div>
                <div id="draftBox" class="selection-box is-hidden"></div>
              </div>
            </div>
          </section>

          <aside class="inspector" aria-label="inspector">
            <div class="inspector-tabs" role="tablist">
              <button class="inspector-tab is-active" role="tab" aria-selected="true">Inspector</button>
              <button class="inspector-tab" role="tab" aria-selected="false">JSON preview</button>
            </div>
            <div class="inspector-body">
              <section class="inspector-section">
                <h3>Selected annotation</h3>
                <div class="chip-row" id="selectedMeta">
                  <span class="chip">未選取</span>
                </div>
              </section>

              <section class="inspector-section">
                <h3>Geometry</h3>
                <div class="field-grid" id="geometryFields"></div>
              </section>

              <section class="inspector-section">
                <h3>Text</h3>
                <div class="field">
                  <label for="textContent">Content</label>
                  <textarea id="textContent" rows="4"></textarea>
                </div>
                <div class="field-grid">
                  <div class="field">
                    <label for="textVariant">Variant</label>
                    <select id="textVariant" class="toolbar-select">
                      <option value="solid">solid</option>
                      <option value="outline">outline</option>
                    </select>
                  </div>
                  <div class="field">
                    <label for="textFontSize">Font size</label>
                    <input id="textFontSize" type="number" min="8" step="1" />
                  </div>
                  <div class="field">
                    <label for="textMaxWidth">Max width</label>
                    <input id="textMaxWidth" type="number" min="0" step="1" />
                  </div>
                </div>
              </section>

              <section class="inspector-section">
                <h3>Blur</h3>
                <div class="field-grid">
                  <div class="field">
                    <label for="blurRadius">Blur radius</label>
                    <input id="blurRadius" type="number" min="1" step="1" />
                  </div>
                  <div class="field">
                    <label for="cornerRadius">Corner radius</label>
                    <input id="cornerRadius" type="number" min="0" step="1" />
                  </div>
                  <div class="field">
                    <label for="feather">Feather</label>
                    <input id="feather" type="number" min="0" step="1" />
                  </div>
                </div>
              </section>

              <section class="inspector-section">
                <h3>Live payload</h3>
                <div class="json-pane">
                  <pre id="jsonPreview">[]</pre>
                </div>
              </section>
            </div>
          </aside>
        </div>

        <div class="status-bar" role="status">
          <span><strong>x</strong> <span id="statusX">0</span></span>
          <span class="sep"></span>
          <span><strong>y</strong> <span id="statusY">0</span></span>
          <span class="sep"></span>
          <span><strong>zoom</strong> <span id="statusZoom">100%</span></span>
          <span class="sep"></span>
          <span><strong>annotations</strong> <span id="statusCount">0</span></span>
          <span class="sep"></span>
          <span><strong>selected</strong> <span id="statusSelected">none</span></span>
          <span class="sep"></span>
          <span style="margin-left:auto;"><strong>mode</strong> GUI · mirrors CLI `--inject-svg`</span>
        </div>
      </section>
    </main>

    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <defs>
        <symbol id="icon-select" viewBox="0 0 24 24"><path d="M5 3l14 9-7 1-1 7-6-17z" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" /></symbol>
        <symbol id="icon-arrow" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19 19 5" /><path d="M12 5h7v7" /></g></symbol>
        <symbol id="icon-rectangle" viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.75" /></symbol>
        <symbol id="icon-ellipse" viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="8" ry="6" fill="none" stroke="currentColor" stroke-width="1.75" /></symbol>
        <symbol id="icon-text" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><path d="M5 6h14" /><path d="M12 6v13" /></g></symbol>
        <symbol id="icon-blur" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="6" width="16" height="12" rx="3" /><path d="M8 10c1.1-1 2.2-1 3.3 0s2.2 1 3.4 0 2.2-1 3.3 0" /><path d="M8 14c1.1-1 2.2-1 3.3 0s2.2 1 3.4 0 2.2-1 3.3 0" /></g></symbol>
        <symbol id="icon-crop" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3v14h14" /><path d="M3 7h14v14" /></g></symbol>
        <symbol id="icon-region-capture" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4H6a2 2 0 00-2 2v3" /><path d="M15 4h3a2 2 0 012 2v3" /><path d="M20 15v3a2 2 0 01-2 2h-3" /><path d="M4 15v3a2 2 0 002 2h3" /><circle cx="12" cy="12" r="3.25" /></g></symbol>
        <symbol id="icon-all-displays" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="8" height="6" rx="1.5" /><rect x="13" y="5" width="8" height="6" rx="1.5" /><rect x="8" y="13" width="8" height="6" rx="1.5" /></g></symbol>
        <symbol id="icon-undo" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10h11a5 5 0 015 5v1" /><path d="M9 5l-5 5 5 5" /></g></symbol>
        <symbol id="icon-redo" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10H9a5 5 0 00-5 5v1" /><path d="M15 5l5 5-5 5" /></g></symbol>
        <symbol id="icon-copy" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="8" width="12" height="12" rx="2" /><path d="M4 16V6a2 2 0 012-2h10" /></g></symbol>
        <symbol id="icon-download" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v12" /><path d="M7 11l5 5 5-5" /><path d="M4 20h16" /></g></symbol>
        <symbol id="icon-capture" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2" /><circle cx="12" cy="12.5" r="3.5" /><path d="M8 6l2-2h4l2 2" /></g></symbol>
        <symbol id="icon-chevron-down" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" /></symbol>
      </defs>
    </svg>

    <div id="toast" class="toast is-hidden"></div>
    <script src="./app.js"></script>
  </body>
</html>
