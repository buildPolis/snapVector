name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create or update (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS artifacts
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: wails/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build unsigned .app and zip archive
        run: |
          cd wails
          wails build -clean -platform darwin/universal -tags production
          app_path="$(find ./build/bin -maxdepth 1 -name '*.app' -print -quit)"
          if [[ -z "$app_path" ]]; then
            echo "expected a .app bundle under wails/build/bin" >&2
            exit 1
          fi

          zip_path="${app_path%.app}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$zip_path"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          if-no-files-found: error
          retention-days: 7
          path: |
            wails/build/bin/*.app
            wails/build/bin/*.zip

  build-windows:
    name: Build Windows artifacts
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: wails/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build unsigned app and NSIS installer
        run: |
          cd wails
          wails build -clean -nsis -platform windows/amd64
          mkdir -p ./release-artifacts/windows
          find ./build -type f -iname '*.exe' -exec cp '{}' ./release-artifacts/windows/ ';'

          if ! compgen -G "./release-artifacts/windows/*.exe" > /dev/null; then
            echo "expected Windows .exe outputs under wails/build" >&2
            exit 1
          fi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          if-no-files-found: error
          retention-days: 7
          path: wails/release-artifacts/windows/*

  build-linux:
    name: Build Linux artifacts
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: wails/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            desktop-file-utils \
            dpkg-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-bin \
            xclip

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build unsigned binary and .deb package
        run: |
          cd wails
          chmod +x ./scripts/package-deb.sh
          ./scripts/package-deb.sh
          cp ./build/bin/snapvector ./build/bin/snapvector-linux-amd64

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          if-no-files-found: error
          retention-days: 7
          path: |
            wails/build/bin/snapvector-linux-amd64
            wails/build/packages/*.deb

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
      - build-linux
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Show release payload
        run: find release-artifacts -maxdepth 3 -type f | sort

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-artifacts/**
