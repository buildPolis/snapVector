name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create or update (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS artifacts
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: wails/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build unsigned .app and zip archive
        run: |
          cd wails
          wails build -clean -platform darwin/universal -tags production
          app_path="$(find ./build/bin -maxdepth 1 -name '*.app' -print -quit)"
          if [[ -z "$app_path" ]]; then
            echo "expected a .app bundle under wails/build/bin" >&2
            exit 1
          fi
          mkdir -p ./release-artifacts/macos
          zip_path="./release-artifacts/macos/snapvector-${RELEASE_TAG}-macos-universal.zip"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$zip_path"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          if-no-files-found: error
          retention-days: 7
          path: wails/release-artifacts/macos/*

  build-windows:
    name: Build Windows artifacts
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: wails/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress

          $nsisCommand = Get-Command makensis.exe -ErrorAction SilentlyContinue
          if ($nsisCommand) {
            Split-Path $nsisCommand.Source -Parent | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            exit 0
          }

          $candidates = @(
            "${env:ProgramFiles(x86)}\NSIS",
            "${env:ProgramFiles}\NSIS",
            "C:\Program Files (x86)\NSIS",
            "C:\Program Files\NSIS"
          )

          foreach ($dir in $candidates) {
            if (Test-Path (Join-Path $dir "makensis.exe")) {
              $dir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              exit 0
            }
          }

          throw "makensis.exe not found after installing NSIS"

      - name: Verify NSIS is available
        shell: pwsh
        run: |
          $nsisCommand = Get-Command makensis.exe -ErrorAction Stop
          Write-Host "Using NSIS from $($nsisCommand.Source)"
          & $nsisCommand.Source /VERSION

      - name: Build unsigned app and NSIS installer
        run: |
          cd wails
          wails build -clean -nsis -platform windows/amd64
          mkdir -p ./release-artifacts/windows
          app_exe="$(find ./build/bin -maxdepth 1 -type f -name 'snapvector.exe' -print -quit)"
          installer_exe="$(find ./build/bin -maxdepth 1 -type f -name '*-installer.exe' -print -quit)"

          if [[ -z "$app_exe" || -z "$installer_exe" ]]; then
            echo "expected app exe and installer exe under wails/build/bin" >&2
            exit 1
          fi

          cp "$app_exe" "./release-artifacts/windows/snapvector-${RELEASE_TAG}-windows-amd64.exe"
          cp "$installer_exe" "./release-artifacts/windows/snapvector-${RELEASE_TAG}-windows-amd64-installer.exe"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          if-no-files-found: error
          retention-days: 7
          path: wails/release-artifacts/windows/*

  build-linux:
    name: Build Linux artifacts
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: wails/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            desktop-file-utils \
            dpkg-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-bin \
            xclip

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build unsigned binary and .deb package
        run: |
          cd wails
          chmod +x ./scripts/package-deb.sh
          VERSION="${RELEASE_TAG#v}" ./scripts/package-deb.sh
          mkdir -p ./release-artifacts/linux
          deb_path="$(find ./build/packages -maxdepth 1 -type f -name '*.deb' -print -quit)"
          if [[ -z "$deb_path" || ! -f ./build/bin/snapvector ]]; then
            echo "expected Linux binary and .deb package outputs" >&2
            exit 1
          fi
          cp ./build/bin/snapvector "./release-artifacts/linux/snapvector-${RELEASE_TAG}-linux-amd64"
          cp "$deb_path" "./release-artifacts/linux/snapvector-${RELEASE_TAG}-linux-amd64.deb"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          if-no-files-found: error
          retention-days: 7
          path: wails/release-artifacts/linux/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
      - build-linux
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Show release payload
        run: find release-artifacts -maxdepth 3 -type f | sort

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-artifacts/**
